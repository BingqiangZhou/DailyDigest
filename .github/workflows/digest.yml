name: OpenClaw Digest

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00（北京时间 8:00）
  workflow_dispatch:
    inputs:
      source:
        description: '信息源'
        required: false
        default: 'tech'
        type: choice
        options:
          - tech
          - podcast
          - wechat
          - all
      report_language:
        description: '报告语言'
        required: false
        default: 'zh'
        type: choice
        options:
          - zh
          - en

permissions:
  contents: write
  actions: read

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed articles tracker
        uses: actions/download-artifact@v4
        with:
          name: processed-articles
          path: workspace/
        continue-on-error: true

      - name: Run OpenClaw Digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          REPORT_LANGUAGE: ${{ github.event.inputs.report_language || 'zh' }}
        run: python main.py --source ${{ github.event.inputs.source || 'tech' }}

      - name: Upload processed articles tracker
        uses: actions/upload-artifact@v4
        with:
          name: processed-articles
          path: workspace/processed_articles.json
          retention-days: 90
        if: always()

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: digest-reports
          path: daily-digests/
          retention-days: 30
        if: always()

      - name: Commit and push reports
        run: |
          if [ -d "daily-digests" ] && [ "$(ls -A daily-digests)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -f daily-digests/
            git diff --cached --quiet || git commit -m "📄 Add digest report $(date +%Y-%m-%d)"
            git pull --rebase --autostash || true
            git push
          else
            echo "No reports to commit"
          fi
